# ===========================================================================
# Codemagic CI/CD configuration - Photo Print Calculator Pro
#
# What this file does, step by step, every time you push to "main":
#   1. Points Gradle/Flutter to the SDKs already installed on the CI machine
#   2. Builds a "key.properties" file from the keystore you uploaded in
#      Codemagic (so android/app/build.gradle can sign the release build
#      exactly the same way it would on your own laptop)
#   3. Installs Flutter packages
#   4. (Re)generates the app icon + splash screen
#   5. Runs `flutter analyze` (won't fail the build even if it finds warnings)
#   6. Builds a signed release APK and AAB
#   7. Uploads both as downloadable build artifacts + emails you the result
#
# ---------------------------------------------------------------------------
# ONE-TIME SETUP YOU MUST DO IN THE CODEMAGIC DASHBOARD (not in this file):
#
#   A) Team settings -> codemagic.yaml settings -> Code signing identities
#      -> Android keystores tab -> upload your .jks file -> fill in
#      Keystore password / Key alias / Key password -> set the
#      "Reference name" to EXACTLY:
#
#            photo_print_calculator_keystore
#
#      (No keystore yet? Android Studio -> Build -> Generate Signed
#      Bundle/APK -> APK -> "Create new..." will create one for you with
#      a simple wizard - no command line needed.)
#
#   B) Replace "your-email@example.com" below with your real email so you
#      get notified when a build finishes (success or failure).
# ===========================================================================

workflows:
  android-release:
    name: Photo Print Calculator Pro - Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable
      android_signing:
        - photo_print_calculator_keystore
      vars:
        PACKAGE_NAME: "com.shriprinthouse.photoprintcalculator"
      # Uncomment the 2 lines below ONLY if you later connect a Google Play
      # service account and want Codemagic to auto-publish to Play Console.
      # groups:
      #   - google_play

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Point Gradle to the Android & Flutter SDKs on this machine
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > "$CM_BUILD_DIR/android/local.properties"
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> "$CM_BUILD_DIR/android/local.properties"

      - name: Generate key.properties from the uploaded keystore
        script: |
          # Codemagic exposes these 4 variables automatically because
          # "android_signing: - photo_print_calculator_keystore" is set
          # above AND a keystore with that exact reference name exists
          # under Team settings > Code signing identities > Android keystores.
          # This recreates the same key.properties file you'd otherwise
          # create by hand for a local build - so build.gradle works
          # identically on Codemagic and on your own laptop.
          if [ -z "$CM_KEYSTORE_PATH" ]; then
            echo "ERROR: No keystore found for reference 'photo_print_calculator_keystore'."
            echo "Upload one under Team settings > Code signing identities > Android keystores"
            echo "and make sure the Reference name matches exactly."
            exit 1
          fi
          cat <<EOF > "$CM_BUILD_DIR/android/key.properties"
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Generate launcher icon & splash screen
        script: |
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Flutter analyze (informational only, never fails the build)
        script: |
          flutter analyze || true

      - name: Build signed release APK
        script: |
          flutter build apk --release

      - name: Build signed app bundle (for Play Store, optional)
        script: |
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - your-email@example.com   # <-- apna email yahan daalein
        notify:
          success: true
          failure: true
