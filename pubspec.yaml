name: photo_print_calculator_pro
description: "Photo Print Calculator Pro - Instant photo print area & price calculator for studios, print houses and framing shops."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Local key-value settings storage
  shared_preferences: ^2.2.3

  # PDF generation, preview, share & print
  pdf: ^3.10.8
  printing: ^5.13.1

  # Formatting numbers, currency & dates
  intl: ^0.19.0

  # UUID for unique calculation IDs
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Generates all Android (and iOS) app icons from a single source image
  flutter_launcher_icons: ^0.13.1

  # Generates native splash screen for Android
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

# ---------------------------------------------------------------------------
# Run: flutter pub run flutter_launcher_icons
# to (re)generate all app icons from assets/icon/app_icon.png
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  min_sdk_android: 21

# ---------------------------------------------------------------------------
# Run: flutter pub run flutter_native_splash:create
# to (re)generate the native splash screen
# ---------------------------------------------------------------------------
flutter_native_splash:
  color: "#0D47A1"
  image: assets/icon/splash_logo.png
  color_dark: "#0B1220"
  image_dark: assets/icon/splash_logo.png
  android_12:
    image: assets/icon/splash_logo.png
    icon_background_color: "#0D47A1"
    image_dark: assets/icon/splash_logo.png
    icon_background_color_dark: "#0B1220"
  android: true
  ios: false
